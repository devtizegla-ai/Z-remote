<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remote Access MVP</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="topbar">
      <div>
        <h1>Remote Access MVP</h1>
        <p class="muted">Acesso remoto assistido com fallback relay</p>
      </div>
      <div id="connectionBadge" class="badge disconnected">Offline</div>
    </header>

    <main class="layout">
      <section id="authSection" class="panel auth-panel">
        <div class="tabs">
          <button id="tabLogin" class="tab active">Login</button>
          <button id="tabRegister" class="tab">Cadastro</button>
          <button id="authSettingsBtn" class="tab">Servidor</button>
        </div>

        <form id="loginForm" class="form active">
          <label>Email</label>
          <input type="email" id="loginEmail" required />
          <label>Senha</label>
          <input type="password" id="loginPassword" required minlength="6" />
          <button type="submit" class="btn btn-primary">Entrar</button>
        </form>

        <form id="registerForm" class="form">
          <label>Nome</label>
          <input type="text" id="registerName" required />
          <label>Email</label>
          <input type="email" id="registerEmail" required />
          <label>Senha</label>
          <input type="password" id="registerPassword" required minlength="6" />
          <button type="submit" class="btn btn-primary">Criar conta</button>
        </form>
      </section>

      <section id="appSection" class="panel app-panel hidden">
        <aside class="sidebar">
          <div>
            <h2 id="userLabel">Usuário</h2>
            <p class="muted" id="deviceLabel">Dispositivo</p>
          </div>
          <button id="refreshDevicesBtn" class="btn">Atualizar dispositivos</button>
          <button id="openSettingsBtn" class="btn">Configurações</button>
          <button id="logoutBtn" class="btn btn-danger">Sair</button>
        </aside>

        <section class="content">
          <div class="card">
            <h3>Dispositivos online</h3>
            <div id="devicesList" class="devices-grid"></div>
          </div>

          <div id="sessionCard" class="card hidden">
            <h3>Sessão remota</h3>
            <div class="session-meta" id="sessionMeta"></div>
            <div class="session-actions">
              <button id="startShareBtn" class="btn btn-primary">Iniciar compartilhamento (host)</button>
              <button id="stopShareBtn" class="btn">Parar compartilhamento</button>
            </div>
            <div class="viewer-wrap">
              <img id="remoteFrame" alt="Tela remota" />
            </div>
            <div class="transfer-row">
              <input id="fileInput" type="file" />
              <button id="sendFileBtn" class="btn">Enviar arquivo</button>
            </div>
            <div class="progress-wrap">
              <progress id="fileProgress" max="100" value="0"></progress>
              <span id="fileProgressLabel">0%</span>
            </div>
            <div id="incomingFiles" class="incoming-files"></div>
          </div>

          <div class="card">
            <h3>Logs de conexão</h3>
            <div id="logsList" class="logs"></div>
          </div>
        </section>
      </section>
    </main>

    <div id="settingsModal" class="modal hidden">
      <div class="modal-content">
        <h3>Configurações</h3>
        <label>URL do servidor</label>
        <input id="settingsServerUrl" type="text" />
        <label>Nome do dispositivo</label>
        <input id="settingsDeviceName" type="text" />
        <label class="inline-toggle">
          <input id="settingsAutoStart" type="checkbox" />
          Iniciar com sistema (preparado)
        </label>
        <div class="modal-actions">
          <button id="saveSettingsBtn" class="btn btn-primary">Salvar</button>
          <button id="closeSettingsBtn" class="btn">Fechar</button>
        </div>
      </div>
    </div>

    <div id="requestModal" class="modal hidden">
      <div class="modal-content">
        <h3>Solicitação de conexão</h3>
        <p id="requestModalText"></p>
        <div class="modal-actions">
          <button id="acceptRequestBtn" class="btn btn-primary">Aceitar</button>
          <button id="rejectRequestBtn" class="btn btn-danger">Rejeitar</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/js/app.js"></script>
  </body>
</html>
